<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="page-header site-header" role="banner">
    <div class="site-header__inner">
      <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Accueil du site">
        <img class="site-brand__logo" src="{{ '/assets/images/site/logo_remi.png' | relative_url }}" alt="Logo du site REMI">
        <span class="site-brand__copy">
          <span class="site-brand__title">{{ site.title }}</span>
          <span class="site-brand__subtitle">{{ site.description }}</span>
        </span>
      </a>
      {% include site-nav.html %}
    </div>
  </header>

  <main class="main-content site-main" role="main">
    {% if page.actions %}
    <div class="page-actions">
      {% for action in page.actions %}
      <a class="page-action{% if action.variant == 'primary' %} page-action--primary{% endif %}" href="{{ action.url | relative_url }}">{{ action.label }}</a>
      {% endfor %}
    </div>
    {% endif %}
    {{ content }}
  </main>
</body>
</html>

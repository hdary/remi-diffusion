<nav class="site-nav" aria-label="Navigation principale">
{% for item in site.data.navigation %}
  {% assign active = false %}
  {% if item.match and page.path contains item.match %}
    {% assign active = true %}
  {% endif %}
  {% if page.path == item.path %}
    {% assign active = true %}
  {% endif %}
  <a class="nav-pill{% if active %} nav-pill--active{% endif %}" href="{{ item.url | relative_url }}">{{ item.label }}</a>
{% endfor %}
</nav>
